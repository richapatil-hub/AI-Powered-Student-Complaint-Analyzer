<!doctype html> 
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AI Complaint Analyzer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0f1a;
        --surface: #131929;
        --border: #1e2d45;
        --accent: #3b82f6;
        --accent2: #06b6d4;
        --text: #e2e8f0;
        --muted: #64748b;
        --error: #f87171;
        --success: #34d399;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.12) 0%,
          transparent 70%
        );
        top: -200px;
        left: -100px;
        pointer-events: none;
      }
      .glow2 {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.08) 0%,
          transparent 70%
        );
        bottom: -100px;
        right: -100px;
        pointer-events: none;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem 2.5rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1.75rem;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .logo-text {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--text);
      }
      .logo-text span {
        color: var(--accent);
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        margin-bottom: 0.4rem;
      }

      .subtitle {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 1.75rem;
      }

      .tabs {
        display: flex;
        gap: 0;
        background: var(--bg);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 1.5rem;
      }

      .tab {
        flex: 1;
        padding: 8px;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        border-radius: 7px;
        cursor: pointer;
        color: var(--muted);
        transition: all 0.2s;
        border: none;
        background: transparent;
      }
      .tab.active {
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .field {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 14px;
        color: var(--text);
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: var(--accent);
      }
      input::placeholder {
        color: var(--muted);
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        margin-top: 0.5rem;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: white;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .msg {
        margin-top: 1rem;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        display: none;
      }
      .msg.error {
        background: rgba(248, 113, 113, 0.1);
        color: var(--error);
        border: 1px solid rgba(248, 113, 113, 0.2);
        display: block;
      }
      .msg.success {
        background: rgba(52, 211, 153, 0.1);
        color: var(--success);
        border: 1px solid rgba(52, 211, 153, 0.2);
        display: block;
      }

      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        margin: 1rem 0;
      }

      .admin-link {
        display: block;
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        margin-top: 1.25rem;
        text-decoration: none;
      }
      .admin-link span {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="glow"></div>
    <div class="glow2"></div>

    <div class="card">
      <div class="logo">
        <div class="logo-icon">🎓</div>
        <div class="logo-text">AI <span>Complaint</span><br />Analyzer</div>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to submit or track your complaints</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@college.edu" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••" />
        </div>
        <button class="btn" onclick="loginUser()">Sign In →</button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display: none">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" />
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@college.edu" />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="Min 6 characters" />
        </div>
        <button class="btn" onclick="registerUser()">Create Account →</button>
      </div>

      <div id="msg" class="msg"></div>

      <a href="admin-login.html" class="admin-link"
        >Admin portal? <span>Click here →</span></a
      >
    </div>

    <!-- Firebase -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        updateProfile,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        getDatabase,
        ref,
        set,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCUx_1QqEKU6M-QMnZ3VtGggPWFUuGqlB8",
        authDomain: "complaint-a921f.firebaseapp.com",
        databaseURL:
          "https://complaint-a921f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "complaint-a921f",
        storageBucket: "complaint-a921f.firebasestorage.app",
        messagingSenderId: "1014033857240",
        appId: "1:1014033857240:web:388f429998ec2e0499f5ad",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      function showMsg(text, type) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className = "msg " + type;
      }

      window.switchTab = (tab) => {
        document.getElementById("loginForm").style.display =
          tab === "login" ? "block" : "none";
        document.getElementById("registerForm").style.display =
          tab === "register" ? "block" : "none";
        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.toggle(
            "active",
            (tab === "login" && i === 0) || (tab === "register" && i === 1),
          );
        });
        document.getElementById("msg").className = "msg";
      };

      window.loginUser = async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const pass = document.getElementById("loginPass").value;
        if (!email || !pass)
          return showMsg("Please fill in all fields.", "error");
        try {
          await signInWithEmailAndPassword(auth, email, pass);
          showMsg("Login successful! Redirecting...", "success");
          setTimeout(
            () => (window.location.href = "student-dashboard.html"),
            1200,
          );
        } catch (e) {
          showMsg("Invalid email or password.", "error");
        }
      };

      window.registerUser = async () => {
        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const pass = document.getElementById("regPass").value;
        if (!name || !email || !pass)
          return showMsg("Please fill in all fields.", "error");
        if (pass.length < 6)
          return showMsg("Password must be at least 6 characters.", "error");
        try {
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          await updateProfile(cred.user, { displayName: name });
          await set(ref(db, "users/" + cred.user.uid), {
            name,
            email,
            role: "student",
            createdAt: Date.now(),
          });
          showMsg("Account created! Redirecting...", "success");
          setTimeout(
            () => (window.location.href = "student-dashboard.html"),
            1200,
          );
        } catch (e) {
          showMsg(
            e.message.includes("email-already")
              ? "Email already registered."
              : "Registration failed.",
            "error",
          );
        }
      };
    </script>
  </body>
</html>
