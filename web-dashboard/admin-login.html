<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — AI Complaint Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #131929; --border: #1e2d45;
      --accent: #f59e0b; --text: #e2e8f0; --muted: #64748b;
      --error: #f87171; --success: #34d399;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      top: -150px; right: -100px; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
    .logo-text span { color: var(--accent); }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.4rem; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 1.75rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 0.5rem;
      background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .msg { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .msg.error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); display: block; }
    .msg.success { background: rgba(52,211,153,0.1); color: var(--success); border: 1px solid rgba(52,211,153,0.2); display: block; }
    .back-link { display: block; text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.25rem; text-decoration: none; }
    .back-link span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">Admin <span>Portal</span></div>
    </div>
    <h1>Admin Sign In</h1>
    <p class="subtitle">Access the complaint management dashboard</p>
    <div class="field">
      <label>Admin Email</label>
      <input type="email" id="email" placeholder="admin@college.edu"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="adminLogin()">Sign In as Admin →</button>
    <div id="msg" class="msg"></div>
    <a href="login.html" class="back-link">Student portal? <span>Click here →</span></a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCUx_1QqEKU6M-QMnZ3VtGggPWFUuGqlB8",
      authDomain: "complaint-a921f.firebaseapp.com",
      databaseURL: "https://complaint-a921f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "complaint-a921f",
      storageBucket: "complaint-a921f.firebasestorage.app",
      messagingSenderId: "1014033857240",
      appId: "1:1014033857240:web:388f429998ec2e0499f5ad"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.adminLogin = async () => {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('pass').value;
      const msg = document.getElementById('msg');
      if (!email || !pass) { msg.textContent = 'Please fill all fields.'; msg.className = 'msg error'; return; }
      try {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        const snap = await get(ref(db, 'users/' + cred.user.uid));
        if (snap.exists() && snap.val().role === 'admin') {
          msg.textContent = 'Login successful! Redirecting...'; msg.className = 'msg success';
          setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
        } else {
          msg.textContent = 'Access denied. Admin accounts only.'; msg.className = 'msg error';
        }
      } catch(e) {
        msg.textContent = 'Invalid email or password.'; msg.className = 'msg error';
      }
    };
  </script>
</body>
</html>
