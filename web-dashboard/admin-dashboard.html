<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — AI Complaint Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #131929; --surface2: #1a2236;
      --border: #1e2d45; --accent: #3b82f6; --accent2: #06b6d4;
      --text: #e2e8f0; --muted: #64748b;
      --success: #34d399; --warning: #fbbf24; --error: #f87171;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; }
    .nav-logo span { color: var(--accent); }
    .admin-badge {
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
      color: var(--accent); font-size: 11px; padding: 3px 10px; border-radius: 20px;
    }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 6px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.5rem;
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
    .stat-val.blue { color: var(--accent); }
    .stat-val.yellow { color: var(--warning); }
    .stat-val.green { color: var(--success); }
    .stat-val.cyan { color: var(--accent2); }

    /* FILTERS */
    .filters {
      display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 13px;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* TABLE */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--surface2); padding: 12px 16px;
      text-align: left; font-size: 12px; font-weight: 500;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid rgba(30,45,69,0.5); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .tag {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap;
    }
    .tag.category { background: rgba(59,130,246,0.1); color: var(--accent); }
    .tag.pending { background: rgba(251,191,36,0.1); color: var(--warning); }
    .tag.resolved { background: rgba(52,211,153,0.1); color: var(--success); }
    .tag.in-progress { background: rgba(6,182,212,0.1); color: var(--accent2); }

    .complaint-title { font-weight: 500; margin-bottom: 3px; }
    .complaint-desc { color: var(--muted); font-size: 12px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    select.status-select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 10px; border-radius: 7px;
      font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
    }

    .empty { text-align: center; color: var(--muted); padding: 3rem; font-size: 14px; }

    /* Category chart */
    .chart-section { margin-top: 2rem; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
    }
    .chart-card h3 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 12px; color: var(--muted); width: 120px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.8s ease; }
    .bar-count { font-size: 12px; color: var(--text); font-weight: 600; width: 24px; text-align: right; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">AI <span>Complaint</span> Analyzer</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="admin-badge">Admin</span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val blue" id="s-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-val yellow" id="s-pending">0</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-val cyan" id="s-progress">0</div></div>
      <div class="stat-card"><div class="stat-label">Resolved</div><div class="stat-val green" id="s-resolved">0</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterComplaints('All', this)">All</button>
      <button class="filter-btn" onclick="filterComplaints('Pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterComplaints('In Progress', this)">In Progress</button>
      <button class="filter-btn" onclick="filterComplaints('Resolved', this)">Resolved</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Complaint</th>
            <th>Student</th>
            <th>Category</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="complaintsBody">
          <tr><td colspan="5" class="empty">Loading complaints...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="chart-section">
      <div class="chart-grid">
        <div class="chart-card">
          <h3>By Category</h3>
          <div id="categoryChart"></div>
        </div>
        <div class="chart-card">
          <h3>By Status</h3>
          <div id="statusChart"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, onValue, update }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCUx_1QqEKU6M-QMnZ3VtGggPWFUuGqlB8",
      authDomain: "complaint-a921f.firebaseapp.com",
      databaseURL: "https://complaint-a921f-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "complaint-a921f",
      storageBucket: "complaint-a921f.firebasestorage.app",
      messagingSenderId: "1014033857240",
      appId: "1:1014033857240:web:388f429998ec2e0499f5ad"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let allComplaints = [];
    let currentFilter = 'All';

    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = 'admin-login.html'; return; }
      loadAllComplaints();
    });

    window.logout = async () => { await signOut(auth); window.location.href = 'admin-login.html'; };

    function loadAllComplaints() {
      onValue(ref(db, 'complaints'), snap => {
        allComplaints = [];
        if (snap.exists()) {
          snap.forEach(child => allComplaints.push({ id: child.key, ...child.val() }));
          allComplaints.sort((a, b) => b.createdAt - a.createdAt);
        }
        updateStats();
        renderTable(currentFilter);
        renderCharts();
      });
    }

    function updateStats() {
      document.getElementById('s-total').textContent = allComplaints.length;
      document.getElementById('s-pending').textContent = allComplaints.filter(c => c.status === 'Pending').length;
      document.getElementById('s-progress').textContent = allComplaints.filter(c => c.status === 'In Progress').length;
      document.getElementById('s-resolved').textContent = allComplaints.filter(c => c.status === 'Resolved').length;
    }

    window.filterComplaints = (filter, btn) => {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable(filter);
    };

    function renderTable(filter) {
      const body = document.getElementById('complaintsBody');
      const items = filter === 'All' ? allComplaints : allComplaints.filter(c => c.status === filter);
      if (!items.length) {
        body.innerHTML = `<tr><td colspan="5" class="empty">No complaints found.</td></tr>`; return;
      }
      body.innerHTML = items.map(c => `
        <tr>
          <td>
            <div class="complaint-title">${c.title}</div>
            <div class="complaint-desc">${c.description}</div>
          </td>
          <td style="font-size:13px;color:var(--muted)">${c.userName || 'Unknown'}</td>
          <td><span class="tag category">${c.category}</span></td>
          <td style="color:var(--muted);font-size:12px">${new Date(c.createdAt).toLocaleDateString()}</td>
          <td>
            <select class="status-select" onchange="updateStatus('${c.id}', this.value)">
              <option ${c.status === 'Pending' ? 'selected' : ''}>Pending</option>
              <option ${c.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
              <option ${c.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
            </select>
          </td>
        </tr>
      `).join('');
    }

    window.updateStatus = async (id, status) => {
      await update(ref(db, 'complaints/' + id), { status });
    };

    function renderCharts() {
      // Category chart
      const cats = {};
      allComplaints.forEach(c => { cats[c.category] = (cats[c.category] || 0) + 1; });
      const maxCat = Math.max(...Object.values(cats), 1);
      document.getElementById('categoryChart').innerHTML = Object.entries(cats)
        .sort((a,b) => b[1]-a[1])
        .map(([cat, count]) => `
          <div class="bar-row">
            <div class="bar-label">${cat}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCat)*100}%"></div></div>
            <div class="bar-count">${count}</div>
          </div>
        `).join('') || '<div style="color:var(--muted);font-size:13px">No data yet</div>';

      // Status chart
      const statuses = { Pending: 0, 'In Progress': 0, Resolved: 0 };
      allComplaints.forEach(c => { if (statuses[c.status] !== undefined) statuses[c.status]++; });
      const maxStat = Math.max(...Object.values(statuses), 1);
      document.getElementById('statusChart').innerHTML = Object.entries(statuses)
        .map(([s, count]) => `
          <div class="bar-row">
            <div class="bar-label">${s}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(count/maxStat)*100}%"></div></div>
            <div class="bar-count">${count}</div>
          </div>
        `).join('');
    }
  </script>
</body>
</html>
